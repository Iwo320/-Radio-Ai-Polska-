<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio AI Polska</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap');

  :root{
    --bg:#0d0f14;
    --panel:#161a23;
    --accent:#7df9c0;
    --accent2:#9b7dfa;
    --text:#eef1f5;
    --muted:#8a93a6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  @media (max-width:420px){
    body{ padding:16px; }
    .player{ padding:24px; }
    .controls{ gap:18px; }
  }
  .player{
    width:100%;
    max-width:420px;
    background:var(--panel);
    border-radius:24px;
    padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.05);
  }
  .station{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:28px;
  }
  .dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 rgba(125,249,192,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(125,249,192,0.5);}
    70%{box-shadow:0 0 0 8px rgba(125,249,192,0);}
    100%{box-shadow:0 0 0 0 rgba(125,249,192,0);}
  }
  .station-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.5px;
  }
  .tag{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }

  .cover{
    width:100%;
    aspect-ratio:1/1;
    border-radius:18px;
    background:linear-gradient(135deg, var(--accent2), #4d3aa8 50%, #1c1430);
    position:relative;
    overflow:hidden;
    margin-bottom:24px;
    display:flex;
    align-items:flex-end;
  }
  .cover::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 30% 20%, rgba(125,249,192,0.35), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1), transparent 50%);
  }
  .cover-info{
    position:relative;
    z-index:1;
    padding:18px;
  }
  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(6px);
    padding:5px 10px;
    border-radius:8px;
    margin-bottom:8px;
  }
  .track-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;
    font-weight:700;
    line-height:1.2;
  }
  .track-artist{
    font-size:13px;
    color:rgba(255,255,255,0.75);
    margin-top:4px;
  }

  .progress{
    height:4px;
    background:rgba(255,255,255,0.08);
    border-radius:4px;
    margin-bottom:8px;
    overflow:hidden;
  }
  .progress-bar{
    height:100%;
    width:38%;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius:4px;
  }
  .times{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--muted);
    margin-bottom:24px;
  }

  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:24px;
    margin-bottom:24px;
  }
  .ctrl-btn{
    background:none;
    border:none;
    color:var(--text);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s ease, color 0.15s ease;
  }
  .ctrl-btn:hover{ color:var(--accent); transform:scale(1.08); }
  .ctrl-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:4px; border-radius:8px; }
  .play-btn{
    width:64px; height:64px;
    border-radius:50%;
    background:var(--text);
    color:var(--bg);
  }
  .play-btn:hover{ background:var(--accent); color:var(--bg); }

  .volume{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:24px;
  }
  .volume input[type=range]{
    flex:1;
    -webkit-appearance:none;
    height:4px;
    border-radius:4px;
    background:rgba(255,255,255,0.1);
  }
  .volume input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:14px;
    border-radius:50%;
    background:var(--accent);
    cursor:pointer;
  }
  .volume input[type=range]::-moz-range-thumb{
    width:14px; height:14px;
    border-radius:50%;
    background:var(--accent);
    border:none;
    cursor:pointer;
  }

  .upnext{
    border-top:1px solid rgba(255,255,255,0.06);
    padding-top:16px;
  }
  .upnext-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    margin-bottom:10px;
  }
  .upnext-item{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:6px 0;
    color:var(--muted);
  }
  .upnext-item span:first-child{ color:var(--text); }

  @media (prefers-reduced-motion: reduce){
    .dot{ animation:none; }
  }
</style>
</head>
<body>

<div class="player">
  <div style="display:flex;gap:18px;font-size:13px;margin-bottom:20px;">
    <a href="index.html" style="color:var(--muted);text-decoration:none;">Strona główna</a>
    <a href="o-nas.html" style="color:var(--muted);text-decoration:none;">O nas</a>
  </div>
  <div class="station">
    <div class="dot"></div>
    <div>
      <div class="station-name">Radio AI Polska</div>
      <div class="tag">Na żywo · spokojna muzyka generowana przez AI</div>
    </div>
  </div>

  <div class="cover">
    <div class="cover-info">
      <span class="badge">Teraz gramy</span>
      <div class="track-title" id="trackTitle">—</div>
      <div class="track-artist" id="trackArtist">—</div>
    </div>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="times"><span id="timeCurrent">0:00</span><span id="timeTotal">2:00</span></div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" aria-label="Poprzedni utwór" title="Poprzedni utwór">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6L9 12l11 6V6z"/></svg>
    </button>
    <button class="ctrl-btn play-btn" id="playBtn" aria-label="Odtwórz" title="Odtwórz">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="Następny utwór" title="Następny utwór">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6-11 6V6z"/></svg>
    </button>
  </div>

  <div class="volume">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/></svg>
    <input type="range" id="volumeSlider" min="0" max="100" value="70" aria-label="Głośność">
  </div>

  <div class="upnext">
    <div class="upnext-label">Następne w playliście</div>
    <div id="upnextList"></div>
  </div>

  <audio id="audio" preload="auto"></audio>
</div>

<script>
  // ===== PLAYLISTA =====
  // 50 utworów - spokojna, elegancka muzyka instrumentalna/AI po polsku.
  // Pliki audio (.mp3) muszą znajdować się w folderze "songs/" o podanych nazwach.
  // Każdy utwór ~2 minuty (120 sekund).
  const playlist = [];
  for (let i = 1; i <= 50; i++) {
    const num = String(i).padStart(2, '0');
    playlist.push({
      title: `Utwór ${num}`,
      artist: 'Radio AI Polska · Spokojna muzyka',
      src: `songs/utwor-${num}.mp3`,
      duration: 120 // 2:00 w sekundach
    });
  }

  // Funkcja Fisher-Yates do losowego ułożenia kolejności
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let queue = shuffle(playlist);
  let currentIndex = 0;

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const trackTitle = document.getElementById('trackTitle');
  const trackArtist = document.getElementById('trackArtist');
  const progressBar = document.getElementById('progressBar');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeTotal = document.getElementById('timeTotal');
  const volumeSlider = document.getElementById('volumeSlider');
  const upnextList = document.getElementById('upnextList');

  const playIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const pauseIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

  function formatTime(sec) {
    if (!isFinite(sec)) sec = 0;
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function loadTrack(index) {
    const track = queue[index];
    trackTitle.textContent = track.title;
    trackArtist.textContent = track.artist;
    timeTotal.textContent = formatTime(track.duration);
    audio.src = track.src;
    renderUpNext();
  }

  function renderUpNext() {
    upnextList.innerHTML = '';
    for (let i = 1; i <= 3; i++) {
      const idx = (currentIndex + i) % queue.length;
      const t = queue[idx];
      const row = document.createElement('div');
      row.className = 'upnext-item';
      row.innerHTML = `<span>${t.title}</span><span>${formatTime(t.duration)}</span>`;
      upnextList.appendChild(row);
    }
  }

  function playTrack() {
    audio.play().catch(() => {});
    playBtn.innerHTML = pauseIcon;
    playBtn.setAttribute('aria-label', 'Pauza');
  }

  function pauseTrack() {
    audio.pause();
    playBtn.innerHTML = playIcon;
    playBtn.setAttribute('aria-label', 'Odtwórz');
  }

  function nextTrack() {
    currentIndex = (currentIndex + 1) % queue.length;
    // gdy playlista się skończy, losujemy ją na nowo
    if (currentIndex === 0) queue = shuffle(playlist);
    loadTrack(currentIndex);
    playTrack();
  }

  function prevTrack() {
    currentIndex = (currentIndex - 1 + queue.length) % queue.length;
    loadTrack(currentIndex);
    playTrack();
  }

  playBtn.addEventListener('click', () => {
    if (audio.paused) playTrack();
    else pauseTrack();
  });

  nextBtn.addEventListener('click', nextTrack);
  prevBtn.addEventListener('click', prevTrack);

  audio.addEventListener('ended', nextTrack);

  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / (audio.duration || queue[currentIndex].duration)) * 100;
    progressBar.style.width = pct + '%';
    timeCurrent.textContent = formatTime(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    timeTotal.textContent = formatTime(audio.duration);
  });

  volumeSlider.addEventListener('input', (e) => {
    audio.volume = e.target.value / 100;
  });

  // inicjalizacja
  audio.volume = volumeSlider.value / 100;
  loadTrack(currentIndex);
</script>

</body>
</html>
