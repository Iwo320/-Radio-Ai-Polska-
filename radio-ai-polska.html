<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odtwarzacz — Radio AI Polska</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..900&family=Inter:wght@400;500;600&display=swap');

  :root{
    --cream:#f2efe9;
    --cream2:#e8e4dc;
    --ink:#161513;
    --ink2:#211f1d;
    --gold:#b8a888;
    --green:#7df9c0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ── NAV ── */
  nav{
    display:flex;justify-content:space-between;align-items:center;
    padding:22px 6vw;
    border-bottom:1px solid rgba(244,237,225,0.07);
    flex-shrink:0;
  }
  .logo{font-family:'Fraunces',serif;font-weight:800;font-size:18px;color:var(--cream);}
  .navlinks{display:flex;gap:28px;font-size:14px;}
  .navlinks a{color:rgba(244,237,225,0.6);text-decoration:none;transition:color .2s;}
  .navlinks a:hover{color:var(--cream);}
  .burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px;}
  .burger span{display:block;width:24px;height:2px;background:var(--gold);border-radius:2px;}
  .mobile-menu{
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:190;
    background:var(--ink2);
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:32px;
    font-family:'Fraunces',serif;font-size:28px;
    transform:translateY(-100%);transition:transform .4s ease;
  }
  .mobile-menu.open{transform:translateY(0);}
  .mobile-menu a{color:var(--cream);text-decoration:none;}
  @media(max-width:700px){.navlinks{display:none;}.burger{display:flex;}}

  /* ── MAIN ── */
  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 6vw;
  }

  .player{
    width:100%;
    max-width:400px;
  }

  /* cover art */
  .cover{
    width:100%;
    aspect-ratio:1/1;
    border-radius:24px;
    background:linear-gradient(135deg,#2a2520,#3d3628,#1e1c18);
    position:relative;
    overflow:hidden;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cover-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(184,168,136,0.25), transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(125,249,192,0.1), transparent 50%);
    animation:bgshift 8s ease-in-out infinite alternate;
  }
  @keyframes bgshift{
    from{opacity:0.6;}
    to{opacity:1;}
  }
  .cover-vinyl{
    width:160px;height:160px;
    border-radius:50%;
    background:conic-gradient(from 0deg,#1a1814,#2e2a24,#1a1814,#2e2a24,#1a1814);
    position:relative;
    z-index:1;
    box-shadow:0 0 60px rgba(184,168,136,0.2);
  }
  .cover-vinyl.spin{animation:spin 4s linear infinite;}
  .cover-vinyl::after{
    content:"";
    position:absolute;
    width:40px;height:40px;
    border-radius:50%;
    background:var(--gold);
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    opacity:0.6;
  }
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  /* live badge */
  .live-badge{
    position:absolute;top:16px;right:16px;z-index:2;
    display:flex;align-items:center;gap:7px;
    background:rgba(22,21,19,0.6);
    backdrop-filter:blur(8px);
    padding:7px 12px;border-radius:100px;
    font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  }
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(125,249,192,0.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(125,249,192,0.5);}70%{box-shadow:0 0 0 7px rgba(125,249,192,0);}100%{box-shadow:0 0 0 0 rgba(125,249,192,0);}}

  /* track info */
  .track-info{margin-bottom:20px;}
  .track-title{font-family:'Fraunces',serif;font-weight:700;font-size:26px;line-height:1.2;margin-bottom:6px;}
  .track-sub{font-size:13px;color:rgba(244,237,225,0.5);}

  /* progress */
  .progress-wrap{margin-bottom:8px;cursor:pointer;padding:6px 0;}
  .progress-track{height:3px;background:rgba(244,237,225,0.1);border-radius:3px;overflow:hidden;}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:3px;}
  .times{display:flex;justify-content:space-between;font-size:11px;color:rgba(244,237,225,0.4);margin-bottom:24px;}

  /* controls */
  .controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px;}
  .ctrl{background:none;border:none;color:rgba(244,237,225,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,transform .15s;}
  .ctrl:hover{color:var(--cream);transform:scale(1.1);}
  .play-btn{
    width:60px;height:60px;border-radius:50%;
    background:var(--cream);color:var(--ink);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s,transform .15s;
  }
  .play-btn:hover{background:var(--gold);transform:scale(1.05);}

  /* volume */
  .vol{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
  .vol svg{color:rgba(244,237,225,0.4);flex-shrink:0;}
  .vol input{
    flex:1;-webkit-appearance:none;height:3px;border-radius:3px;
    background:rgba(244,237,225,0.1);cursor:pointer;
  }
  .vol input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;}
  .vol input::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--gold);border:none;}

  /* up next */
  .upnext{border-top:1px solid rgba(244,237,225,0.07);padding-top:16px;}
  .upnext-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(244,237,225,0.35);margin-bottom:10px;}
  .upnext-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(244,237,225,0.04);}
  .upnext-item:last-child{border-bottom:none;}
  .upnext-item .ut{font-size:14px;color:var(--cream);}
  .upnext-item .ud{font-size:12px;color:rgba(244,237,225,0.35);}

  @media(max-width:480px){
    main{padding:24px 20px;}
    .track-title{font-size:22px;}
    .play-btn{width:54px;height:54px;}
    .controls{gap:16px;}
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Radio AI Polska</div>
  <div class="navlinks">
    <a href="index.html">Strona główna</a>
    <a href="radio-ai-polska.html">Odtwarzacz</a>
    <a href="o-nas.html">O nas</a>
  </div>
  <button class="burger" id="burgerBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mmenu">
  <a href="index.html" onclick="closeMMenu()">Strona główna</a>
  <a href="radio-ai-polska.html" onclick="closeMMenu()">Odtwarzacz</a>
  <a href="o-nas.html" onclick="closeMMenu()">O nas</a>
</div>

<main>
  <div class="player">

    <div class="cover">
      <div class="cover-bg"></div>
      <div class="cover-vinyl" id="vinyl"></div>
      <div class="live-badge"><div class="live-dot"></div>Na żywo</div>
    </div>

    <div class="track-info">
      <div class="track-title" id="trackTitle">Ładowanie...</div>
      <div class="track-sub">Radio AI Polska · Spokojna muzyka AI</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    </div>
    <div class="times"><span id="timeCur">0:00</span><span id="timeDur">2:00</span></div>
    <div class="controls"
      </button>
      <button class="play-btn" id="playBtn" aria-label="Odtwórz">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
    <div class="vol">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/></svg>
      <input type="range" id="volSlider" min="0" max="100" value="70" aria-label="Głośność">
    </div>

    <div class="upnext">
      <div class="upnext-label">Następne w kolejce</div>
      <div id="upnextList"></div>
    </div>

  </div>
</main>

<script>
  // Mobile menu
  function closeMMenu(){ document.getElementById('mmenu').classList.remove('open'); }
  document.getElementById('burgerBtn').addEventListener('click',()=>{ document.getElementById('mmenu').classList.toggle('open'); });

  // ── Playlista (Web Audio — nie wymaga plików mp3) ──
  const TRACKS = [
    {title:"Nocna Mgła",        freq:220, freq2:330},
    {title:"Brzask nad Wisłą",  freq:196, freq2:294},
    {title:"Cicha Dolina",      freq:246, freq2:369},
    {title:"Srebrne Jezioro",   freq:174, freq2:261},
    {title:"Spokojny Wieczór",  freq:261, freq2:392},
    {title:"Jesienny Deszcz",   freq:233, freq2:349},
    {title:"Szept Lasu",        freq:185, freq2:277},
    {title:"Mglisty Poranek",   freq:207, freq2:311},
    {title:"Złota Godzina",     freq:164, freq2:246},
    {title:"Cisza przed Świtem",freq:277, freq2:415},
    {title:"Polne Kwiaty",      freq:311, freq2:466},
    {title:"Deszcz na Szybie",  freq:155, freq2:233},
    {title:"Wieczorne Miasto",  freq:138, freq2:207},
    {title:"Leśna Ścieżka",     freq:293, freq2:440},
    {title:"Biała Noc",         freq:329, freq2:493},
    {title:"Głęboka Woda",      freq:130, freq2:196},
    {title:"Górska Rzeka",      freq:349, freq2:523},
    {title:"Starość i Czas",    freq:146, freq2:220},
    {title:"Ostatni Pociąg",    freq:392, freq2:587},
    {title:"Cisza",             freq:110, freq2:165},
  ];

  function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }
  let queue = shuffle(TRACKS);
  let qIdx = 0;
  let playing = false;
  let actx = null;
  let activeNodes = [];
  let startTime = 0, elapsed = 0;
  const DURATION = 120;

  const trackTitle = document.getElementById('trackTitle');
  const progressBar = document.getElementById('progressBar');
  const timeCur = document.getElementById('timeCur');
  const timeDur = document.getElementById('timeDur');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const volSlider = document.getElementById('volSlider');
  const upnextList = document.getElementById('upnextList');
  const vinyl = document.getElementById('vinyl');

  const playIcon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const pauseIcon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

  function fmt(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

  function renderUpNext(){
    upnextList.innerHTML='';
    for(let i=1;i<=3;i++){
      const t = queue[(qIdx+i)%queue.length];
      const d = document.createElement('div');
      d.className='upnext-item';
      d.innerHTML=`<span class="ut">${t.title}</span><span class="ud">${fmt(DURATION)}</span>`;
      upnextList.appendChild(d);
    }
  }

  function loadTrack(idx){
    const t = queue[idx];
    trackTitle.textContent = t.title;
    timeDur.textContent = fmt(DURATION);
    elapsed = 0;
    updateUI();
    renderUpNext();
  }

  function updateUI(){
    const pct = Math.min(elapsed/DURATION*100,100);
    progressBar.style.width = pct+'%';
    timeCur.textContent = fmt(elapsed);
  }

  function stopNodes(){
    const now = actx ? actx.currentTime : 0;
    activeNodes.forEach(n=>{
      try{
        if(n.gain){n.gain.setValueAtTime(n.gain.value,now);n.gain.linearRampToValueAtTime(0,now+0.6);}
        setTimeout(()=>{try{n.stop();}catch(e){}},700);
      }catch(e){}
    });
    activeNodes=[];
  }

  function startTone(track){
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    stopNodes();

    const masterGain = actx.createGain();
    masterGain.gain.setValueAtTime(0, actx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.05*(volSlider.value/100), actx.currentTime+1.8);
    masterGain.connect(actx.destination);

    // create a chord (root + fifth + octave soft)
    [[track.freq,0.5],[track.freq2,0.3],[track.freq*2,0.15]].forEach(([f,vol])=>{
      const osc = actx.createOscillator();
      const g = actx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, actx.currentTime);
      // gentle vibrato
      const lfo = actx.createOscillator();
      const lg = actx.createGain();
      lfo.frequency.value = 0.25;
      lg.gain.value = 0.8;
      lfo.connect(lg); lg.connect(osc.frequency);
      g.gain.value = vol;
      osc.connect(g); g.connect(masterGain);
      osc.start(); lfo.start();
      activeNodes.push({stop:()=>{osc.stop();lfo.stop();},gain:masterGain.gain});
    });

    // keep reference to masterGain for volume
    window._masterGain = masterGain;
    startTime = actx.currentTime - elapsed;
  }

  function playTrack(){
    playing=true;
    playBtn.innerHTML=pauseIcon;
    vinyl.classList.add('spin');
    startTone(queue[qIdx]);
    tick();
  }

  function pauseTrack(){
    if(actx) elapsed = actx.currentTime - startTime;
    playing=false;
    playBtn.innerHTML=playIcon;
    vinyl.classList.remove('spin');
    stopNodes();
  }

  function nextTrack(){
    qIdx=(qIdx+1)%queue.length;
    if(qIdx===0) queue=shuffle(TRACKS);
    loadTrack(qIdx);
    if(playing) playTrack();
  }

  function prevTrack(){
    qIdx=(qIdx-1+queue.length)%queue.length;
    loadTrack(qIdx);
    if(playing) playTrack();
  }

  function tick(){
    if(!playing) return;
    if(actx) elapsed = actx.currentTime - startTime;
    updateUI();
    if(elapsed>=DURATION){ nextTrack(); return; }
    requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click',()=>{ if(playing) pauseTrack(); else playTrack(); });
  nextBtn.addEventListener('click', nextTrack);
  prevBtn.addEventListener('click', prevTrack);

  volSlider.addEventListener('input',()=>{
    if(window._masterGain && actx){
      window._masterGain.gain.setValueAtTime(0.05*(volSlider.value/100), actx.currentTime);
    }
  });

  loadTrack(0);
</script>

</body>
</html>
